spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/lynx_auth_db
    username: auth_user
    password: auth_password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  user:
    min-age: 18

jwt:
  secret: mysupersecretkeymysupersecretkeymysupersecretkey123456

server:
  port: 8081

internal:
  api-key: secret123