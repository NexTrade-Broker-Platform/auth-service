spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/lynx_auth_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  user:
    min-age: 18
  cookie:
    secure: ${COOKIE_SECURE:true}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

server:
  port: 9001

internal:
  api-key: ${INTERNAL_API_KEY}